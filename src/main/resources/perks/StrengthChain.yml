id: 3
price: 300
shared: false
material: "REDSTONE"
name: "&c&lStrength-Chaining"
lore:
  - "&c+8% damage &7for 7s"
  - "&7stacking on kill"

damage:
  if [StrengthChain::attacker]=null:
  # Do nothing
  else:
    setDamage: damage + 1 * [StrengthChain::attacker]

kill:
  if [StrengthChain::attacker]=null:
    setVariable: '[StrengthChain::attacker],1'
  else:
    setVariable: '[StrengthChain::attacker],[StrengthChain::attacker] + 1'

  wait 7 seconds:
    if [StrengthChain::attacker]=null:
    # Do nothing
    else:
      if [StrengthChain::attacker]=0:
      # Do nothing
      else:
        setVariable: '[StrengthChain::attacker],[StrengthChain::attacker] - 1'
